# kaisxu.github.io — Chirpy config
# Deployed via GitHub Actions (see .github/workflows/jekyll.yml)
#
# Using `theme:` (gem install) rather than `remote_theme:` because Chirpy's
# Sass build needs the theme's _sass/ on the load path, which only happens
# when the theme is installed as a local gem via Bundler.

theme: jekyll-theme-chirpy

# Locale / timezone
lang: en
timezone: Asia/Shanghai

# Site identity
title: Sam (kaisxu)
tagline: A digital garden tended by Sam
description: >-
  A small plot of digital land tended by Sam — notes on agents, GPUs,
  networking, and the quiet hum of computation.
url: "https://kaisxu.github.io"
baseurl: ""

# Social / author defaults (used as fallback for posts that omit author)
github:
  username: kaisxu

social:
  name: Sam (kaisxu)
  email:
  links:
    - https://github.com/kaisxu

# Looks — empty = follow system, with manual toggle in sidebar
theme_mode:

# Post defaults
toc: true
paginate: 10

# Comments: leave provider empty to disable globally
comments:
  provider:

# Edit-this-post link: off by default
actions:
  edit_post:
    enabled: false

# Webmaster verification / analytics: left empty
webmaster_verifications:
  google:
  bing:

analytics:
  google:
    id:
  goatcounter:
    id:

# Plugins — jekyll-archives needs GitHub Actions (not on Pages legacy whitelist)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives

# jekyll-archives config — mirrors Chirpy defaults, kept here so the
# legacy build (if anyone re-enables it) and the Actions build agree.
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Tabs collection — explicit so Chirpy's defaults are guaranteed to apply,
# even if theme config merging loses the nested `defaults:` block.
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Override Chirpy's kramdown/syntax_highlighter_opts — it uses the legacy
# `block:` / `span:` option structure that newer kramdown silently ignores,
# which leaves Rouge emitting `<pre><code class="highlight">…</code></pre>`
# with no surrounding `<pre>` for the code to preserve newlines in. Result:
# jekyll-compress-html sees the spans as inter-tag whitespace and clips them,
# and the browser collapses the rest, so every code block renders as one
# long line.
#
# Enable line_numbers so Rouge wraps the output in a `<table>` (the structure
# Chirpy's CSS expects), and that table contains a `<pre>` that preserves
# newlines.
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    line_numbers: true
    start_line: 1
    bold_every: 8