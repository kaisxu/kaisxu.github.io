<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#222">LLaMA-70B decode 工作点 vs roofline（H100 / H200 / B200）</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#666">FP16 dense 口径 + FP16 KV，g=8，T=4096；横轴 = 算术强度 AI (FLOP/byte)，纵轴 = 可达吞吐 (TFLOPs)，均为对数</text>

  <!-- Axes -->
  <line x1="80" y1="500" x2="820" y2="500" stroke="#222" stroke-width="1"/>
  <line x1="80" y1="50"  x2="80"  y2="500" stroke="#222" stroke-width="1"/>

  <!-- X gridlines + labels (AI = 1, 10, 100, 1000) -->
  <line x1="162.2" y1="500" x2="162.2" y2="494" stroke="#222"/>
  <text x="162.2" y="518" text-anchor="middle" font-size="11" fill="#222">1</text>
  <line x1="326.7" y1="500" x2="326.7" y2="494" stroke="#222"/>
  <text x="326.7" y="518" text-anchor="middle" font-size="11" fill="#222">10</text>
  <line x1="491.1" y1="500" x2="491.1" y2="494" stroke="#222"/>
  <text x="491.1" y="518" text-anchor="middle" font-size="11" fill="#222">100</text>
  <line x1="655.6" y1="500" x2="655.6" y2="494" stroke="#222"/>
  <text x="655.6" y="518" text-anchor="middle" font-size="11" fill="#222">1000</text>
  <text x="450" y="552" text-anchor="middle" font-size="13" fill="#222">算术强度 AI (FLOP/byte)</text>

  <!-- Y gridlines + labels (TFLOPs = 1, 10, 100, 1000, 10 000) -->
  <line x1="80" y1="455" x2="86" y2="455" stroke="#222"/>
  <text x="74" y="459" text-anchor="end" font-size="11" fill="#222">1</text>
  <line x1="80" y1="365" x2="86" y2="365" stroke="#222"/>
  <text x="74" y="369" text-anchor="end" font-size="11" fill="#222">10</text>
  <line x1="80" y1="275" x2="86" y2="275" stroke="#222"/>
  <text x="74" y="279" text-anchor="end" font-size="11" fill="#222">100</text>
  <line x1="80" y1="185" x2="86" y2="185" stroke="#222"/>
  <text x="74" y="189" text-anchor="end" font-size="11" fill="#222">1 000</text>
  <line x1="80" y1="95"  x2="86" y2="95"  stroke="#222"/>
  <text x="74" y="99"  text-anchor="end" font-size="11" fill="#222">10 000</text>
  <text x="32" y="280" text-anchor="middle" font-size="13" fill="#222" transform="rotate(-90 32 280)">可达吞吐 (TFLOPs)</text>

  <!-- Region labels: bandwidth-bound (left) vs compute-bound (right) -->
  <text x="280" y="480" font-size="12" fill="#888" font-style="italic">← 带宽受限</text>
  <text x="700" y="60"  font-size="12" fill="#888" font-style="italic">→ 算力受限</text>

  <!-- H100 BW line: y = 3.35·AI TFLOPs, (1, 3.35) to (295, 989) dense ridge -->
  <line x1="162.2" y1="407.7" x2="567.9" y2="185.4" stroke="#1f77b4" stroke-width="2"/>
  <!-- H200 BW line: y = 4.8·AI, (1, 4.8) to (206, 989) dense ridge -->
  <line x1="162.2" y1="393.6" x2="542.7" y2="185.4" stroke="#ff7f0e" stroke-width="2"/>
  <!-- B200 BW line: y = 8·AI, (1, 8) to (281, 2250) dense ridge -->
  <line x1="162.2" y1="373.7" x2="564.8" y2="153.3" stroke="#2ca02c" stroke-width="2"/>

  <!-- FP16 dense peak horizontal (989 TFLOPs for H100/H200) -->
  <line x1="80" y1="185.4" x2="820" y2="185.4" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- B200 FP16 dense peak (2250 TFLOPs) -->
  <line x1="80" y1="153.3" x2="820" y2="153.3" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Ridge vertical guides (dense 一致口径) -->
  <line x1="567.9" y1="185.4" x2="567.9" y2="500" stroke="#1f77b4" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="542.7" y1="185.4" x2="542.7" y2="500" stroke="#ff7f0e" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="564.8" y1="153.3" x2="564.8" y2="500" stroke="#2ca02c" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Line labels at right edge -->
  <text x="623" y="178" font-size="11" fill="#1f77b4">H100 (3.35 TB/s)</text>
  <text x="597" y="170" font-size="11" fill="#ff7f0e">H200 (4.8 TB/s)</text>
  <text x="571" y="148" font-size="11" fill="#2ca02c">B200 (8 TB/s)</text>

  <!-- FP16 dense peak labels -->
  <text x="816" y="181" text-anchor="end" font-size="10" fill="#888">H100/H200 FP16 dense peak (989 TFLOPs)</text>
  <text x="816" y="148" text-anchor="end" font-size="10" fill="#aaa">B200 FP16 dense peak (2250)</text>

  <!-- Decode work points (LLaMA-70B, FP16, g=8, T=4096) -->
  <circle cx="167.0" cy="405.2" r="5" fill="#d62728"/>
  <text x="178" y="403" font-size="11" fill="#d62728">B=1 (AI=1.07)</text>

  <circle cx="310.9" cy="326.5" r="5" fill="#d62728"/>
  <text x="322" y="324" font-size="11" fill="#d62728">B=8 (AI=8.0)</text>

  <circle cx="395.8" cy="279.9" r="5" fill="#d62728"/>
  <text x="407" y="277" font-size="11" fill="#d62728">B=32 (AI=26.4)</text>

  <circle cx="456.6" cy="246.5" r="5" fill="#d62728"/>
  <text x="468" y="244" font-size="11" fill="#d62728">B=128 (AI=62)</text>

  <!-- Prefill work point: clipped to FP16 dense ceiling (989 TFLOPs on H100/H200 line) -->
  <circle cx="757.2" cy="185.4" r="6" fill="#9467bd"/>
  <text x="650" y="125" font-size="11" fill="#9467bd">prefill B=1, S=4096 (AI≈4200, 贴在 dense 算力墙)</text>

  <!-- Caption annotations -->
  <text x="320" y="445" font-size="12" fill="#444" font-style="italic">decode 永远卡在斜线段（带宽墙）</text>
  <text x="630" y="138" font-size="12" fill="#444" font-style="italic">prefill 早就坐上算力墙</text>

  <!-- Legend (with ridge values consolidated to avoid overlap at bottom) -->
  <g transform="translate(80, 65)" font-size="11" fill="#222">
    <rect x="0" y="-12" width="280" height="120" fill="#fafafa" stroke="#ddd"/>
    <text x="8" y="2" font-size="11" font-weight="bold">图例</text>
    <line x1="8" y1="18" x2="28" y2="18" stroke="#1f77b4" stroke-width="2"/>
    <text x="34" y="22">H100 BW line · ridge=295 (dense)</text>
    <line x1="8" y1="34" x2="28" y2="34" stroke="#ff7f0e" stroke-width="2"/>
    <text x="34" y="38">H200 BW line · ridge=206 (dense)</text>
    <line x1="8" y1="50" x2="28" y2="50" stroke="#2ca02c" stroke-width="2"/>
    <text x="34" y="54">B200 BW line · ridge=281 (dense)</text>
    <line x1="8" y1="66" x2="28" y2="66" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="34" y="70">FP16 dense peak (H100/H200 = 989)</text>
    <circle cx="18" cy="82" r="5" fill="#d62728"/>
    <text x="34" y="86">Decode 工作点 (B=1/8/32/128)</text>
    <circle cx="18" cy="98" r="6" fill="#9467bd"/>
    <text x="34" y="102">Prefill 工作点 (S=4096, 贴在算力墙)</text>
  </g>
</svg>